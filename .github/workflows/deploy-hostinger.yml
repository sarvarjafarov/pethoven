name: Deploy to Hostinger

# Branch-gated deploys:
#   push to `staging` → opossum test site
#   push to `main`    → pethoven.com production
#
# Prereqs (set as GitHub Actions secrets on this repo):
#   HOSTINGER_SSH_KEY      — private key with access to the Hostinger SSH user
#   HOSTINGER_HOST         — Hostinger SSH host (same for both sites on the shared plan)
#   HOSTINGER_USERNAME     — Hostinger SSH user (usually u########)
#   HOSTINGER_STAGING_DIR  — absolute remote path to the opossum site's public_html
#   HOSTINGER_PROD_DIR     — absolute remote path to pethoven.com's public_html
#
# Each server MUST carry its own .env file next to wp-config.php with:
#   - WORDPRESS_DB_NAME / DB_USER / DB_PASSWORD (that site's database)
#   - WP_HOME / WP_SITEURL (that site's canonical URL)
# Without these, the site will fail visibly — which is safer than cross-talk.

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

env:
  RSYNC_ARGS: >-
    -az --delete --delete-excluded
    --exclude=wp-content/uploads/**
    --exclude=wp-content/cache/**
    --exclude=wp-content/upgrade/**
    --exclude=wp-content/debug.log
    --exclude=.git/**
    --exclude=.github/**
    --exclude=.htaccess
    --exclude=.env
    --exclude=.env.*
    --exclude=scripts/**
    --exclude=docker-compose.yml
    --exclude=README.md
    --exclude=CNAME

jobs:
  deploy-staging:
    name: Deploy → staging (opossum)
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync files via rsync over SSH
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_CMD_ARGS: -o StrictHostKeyChecking=no
          REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_USERNAME }}
          REMOTE_PORT: 65002
          SOURCE: ./
          TARGET: ${{ secrets.HOSTINGER_STAGING_DIR }}
          ARGS: ${{ env.RSYNC_ARGS }}

  deploy-production:
    name: Deploy → production (pethoven.com)
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync files via rsync over SSH
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_CMD_ARGS: -o StrictHostKeyChecking=no
          REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_USERNAME }}
          REMOTE_PORT: 65002
          SOURCE: ./
          TARGET: ${{ secrets.HOSTINGER_PROD_DIR }}
          ARGS: ${{ env.RSYNC_ARGS }}
