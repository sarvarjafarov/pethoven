name: Deploy to Hostinger

# Branch-gated deploys:
#   push to `staging` → opossum test site
#   push to `main`    → pethoven.com production
#
# Prereqs (set as GitHub Actions secrets on this repo):
#   HOSTINGER_SSH_KEY      — private key with access to the Hostinger SSH user
#   HOSTINGER_HOST         — Hostinger SSH host (same for both sites on the shared plan)
#   HOSTINGER_USERNAME     — Hostinger SSH user (usually u########)
#   HOSTINGER_STAGING_DIR  — absolute remote path to the opossum site's public_html
#   HOSTINGER_PROD_DIR     — absolute remote path to pethoven.com's public_html
#
# Each server MUST carry its own .env file next to wp-config.php with:
#   - WORDPRESS_DB_NAME / DB_USER / DB_PASSWORD (that site's database)
#   - WP_HOME / WP_SITEURL (that site's canonical URL)
# Without these, the site will fail visibly — which is safer than cross-talk.

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target dir
        id: t
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dir=${{ secrets.HOSTINGER_PROD_DIR }}" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "dir=${{ secrets.HOSTINGER_STAGING_DIR }}" >> "$GITHUB_OUTPUT"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unsupported branch ${{ github.ref_name }}"; exit 1
          fi

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to ${{ steps.t.outputs.env_name }}
        run: |
          set -o pipefail

          # Rsync exit codes we treat as non-fatal on Hostinger shared hosting:
          #   23 — partial transfer (LiteSpeed cache files often not writable)
          #   24 — some files vanished during transfer (temp files)
          # Any other non-zero is a real failure.

          set +e
          rsync -az --delete --delete-excluded \
            --exclude='wp-content/uploads/**' \
            --exclude='wp-content/cache/**' \
            --exclude='wp-content/upgrade/**' \
            --exclude='wp-content/debug.log' \
            --exclude='.git/**' \
            --exclude='.github/**' \
            --exclude='.htaccess' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='scripts/**' \
            --exclude='docker-compose.yml' \
            --exclude='README.md' \
            --exclude='CNAME' \
            -e "ssh -i ~/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:${{ steps.t.outputs.dir }}/"
          rc=$?
          set -e

          if [ $rc -eq 0 ] || [ $rc -eq 23 ] || [ $rc -eq 24 ]; then
            echo "rsync completed (exit $rc — ${rc/0/clean}${rc/23/partial, non-fatal on Hostinger}${rc/24/vanished files, non-fatal})"
            exit 0
          else
            echo "::error::rsync failed with exit code $rc"
            exit $rc
          fi
