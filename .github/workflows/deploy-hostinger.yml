name: Deploy to Hostinger

# Branch-gated deploys:
#   push to `staging` → opossum test site
#   push to `main`    → pethoven.com production
#
# Prereqs (set as GitHub Actions secrets on this repo):
#   HOSTINGER_SSH_KEY      — private key with access to the Hostinger SSH user
#   HOSTINGER_HOST         — Hostinger SSH host (same for both sites on the shared plan)
#   HOSTINGER_USERNAME     — Hostinger SSH user (usually u########)
#   HOSTINGER_STAGING_DIR  — absolute remote path to the opossum site's public_html
#   HOSTINGER_PROD_DIR     — absolute remote path to pethoven.com's public_html
#
# Each server MUST carry its own .env file next to wp-config.php with:
#   - WORDPRESS_DB_NAME / DB_USER / DB_PASSWORD (that site's database)
#   - WP_HOME / WP_SITEURL (that site's canonical URL)
# Without these, the site will fail visibly — which is safer than cross-talk.

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target dir
        id: t
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dir=${{ secrets.HOSTINGER_PROD_DIR }}" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "dir=${{ secrets.HOSTINGER_STAGING_DIR }}" >> "$GITHUB_OUTPUT"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unsupported branch ${{ github.ref_name }}"; exit 1
          fi

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Trust Hostinger host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 65002 -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Probe SSH connectivity
        run: |
          ssh -p 65002 -o StrictHostKeyChecking=no \
            "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}" \
            "echo SSH_OK; hostname; pwd; ls -d '${{ steps.t.outputs.dir }}'"

      - name: Rsync to ${{ steps.t.outputs.env_name }}
        run: |
          # Build exclude list into a file to avoid any shell-quoting
          # surprises around glob patterns.
          # CRITICAL: wp-content/plugins and wp-content/uploads are
          # SERVER-MANAGED and must NEVER be touched by deploy — they
          # hold installed plugins and user uploads that aren't in git.
          # Excluding them means rsync doesn't sync AND doesn't delete
          # anything inside them.
          cat > /tmp/rsync-excludes <<'EXCLUDES'
          wp-content/plugins/**
          wp-content/uploads/**
          wp-content/cache/**
          wp-content/upgrade/**
          wp-content/debug.log
          .git/**
          .github/**
          .htaccess
          .env
          .env.*
          scripts/**
          docker-compose.yml
          README.md
          CNAME
          EXCLUDES

          # --delete removes stale files from target, but NEVER files
          # matching --exclude-from (that requires --delete-excluded,
          # which we deliberately do NOT pass).
          #
          # Accept rsync exit codes 23/24 as success — Hostinger's
          # LiteSpeed sometimes leaves cache files that the deploy
          # user can't touch, producing "partial transfer" warnings
          # even though all actual code synced correctly.
          set +e
          rsync -az --delete -v --stats \
            --exclude-from=/tmp/rsync-excludes \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:${{ steps.t.outputs.dir }}/"
          rc=$?
          set -e

          echo "rsync exit code: $rc"
          case $rc in
            0)  echo "clean sync"; exit 0 ;;
            23) echo "partial transfer (non-fatal on Hostinger); continuing"; exit 0 ;;
            24) echo "some files vanished mid-transfer (non-fatal); continuing"; exit 0 ;;
            *)  echo "::error::rsync failed with code $rc"; exit $rc ;;
          esac
